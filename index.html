<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>급식실 상태</title>

<!-- 폰트 -->
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #0f2027, #2c5364);
  font-family: 'Noto Sans KR', sans-serif;
  color: white;
  overflow: hidden;
}

/* 배경 애니메이션 */
body::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
  background-size: 50px 50px;
  animation: moveBg 20s linear infinite;
}

@keyframes moveBg {
  from { transform: translate(0,0); }
  to { transform: translate(-200px,-200px); }
}

/* 카드 */
.card {
  position: relative;
  padding: 50px;
  border-radius: 25px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  text-align: center;
  width: 340px;
  z-index: 1;
}

/* 제목 */
h1 {
  font-size: 26px;
  margin-bottom: 25px;
  opacity: 0.85;
}

/* 상태 텍스트 */
.status {
  font-size: 70px;
  font-weight: 700;
  margin: 25px 0;
  animation: glow 2s infinite alternate;
}

/* 설명 */
.desc {
  font-size: 18px;
  opacity: 0.85;
}

/* 시간 */
.time {
  margin-top: 25px;
  font-size: 14px;
  opacity: 0.6;
}

/* 상태 색 + 네온 */
.busy {
  color: #ff4d4f;
  text-shadow: 0 0 20px #ff4d4f, 0 0 40px #ff4d4f;
}

.normal {
  color: #fadb14;
  text-shadow: 0 0 20px #fadb14, 0 0 40px #fadb14;
}

.free {
  color: #52c41a;
  text-shadow: 0 0 20px #52c41a, 0 0 40px #52c41a;
}

/* 깜빡이는 효과 */
@keyframes glow {
  from { transform: scale(1); }
  to { transform: scale(1.05); }
}
</style>
</head>

<body>

<div class="card">
  <h1>🍽 급식실 상태</h1>

  <!-- 🔥 여기만 바꾸면 됨 -->
  <div class="status busy">🔴 혼잡</div>
  <div class="desc">현재 사람이 폭발적으로 많습니다 🚨</div>
  <div class="time">⏱ 12:32 기준</div>

</div>

</body>
</html>
